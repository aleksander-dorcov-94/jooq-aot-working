spring:
  application:
    name: jooqshop
  docker:
    compose:
      lifecycle-management: start_only
  datasource:
    url: jdbc:postgresql://localhost:5432/jooqshop
    username: user
    password: password
  sql:
    init:
      mode: always
  threads:
    virtual:
      enabled: true
logging:
  level:
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.jooq.tools.LoggerListener: debug

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,startup,beans,conditions # Explicit list is safer/clearer than "*"
  endpoint:
    health:
      show-details: always

